<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawn Assessment Generator</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1400px; margin: 0 auto; padding: 20px; background: #f0f2f5; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 1024px) { .container { grid-template-columns: 1fr; } }
        .panel { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
        .panel-header { background: #1e3a5f; color: white; padding: 15px 20px; font-weight: bold; }
        .panel-body { padding: 20px; max-height: 80vh; overflow-y: auto; }
        .form-section { margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 6px; border-left: 3px solid #2c5282; }
        .section-title { color: #1e3a5f; font-weight: bold; margin-bottom: 10px; font-size: 0.9rem; text-transform: uppercase; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 0.85rem; color: #333; }
        input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem; }
        textarea { min-height: 60px; resize: vertical; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .checkbox-item { display: flex; align-items: center; gap: 6px; padding: 6px; background: white; border-radius: 4px; border: 1px solid #e2e8f0; }
        .checkbox-item input { width: auto; }
        .checkbox-item label { margin: 0; font-weight: normal; font-size: 0.8rem; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; margin: 5px; font-size: 0.85rem; }
        .btn-primary { background: #1e3a5f; color: white; }
        .btn-success { background: #38a169; color: white; }
        .btn-warning { background: #d69e2e; color: white; }
        .btn-secondary { background: #e2e8f0; color: #4a5568; }
        .actions { margin-top: 20px; padding-top: 15px; border-top: 2px solid #e2e8f0; }
        .output-panel { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 6px; padding: 20px; font-family: Georgia, serif; line-height: 1.6; white-space: pre-wrap; min-height: 400px; }
        .assessment-header { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #1e3a5f; }
        .assessment-header h2 { color: #1e3a5f; margin: 0; font-size: 1.2rem; }
        .hidden { display: none !important; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; margin-left: 10px; }
        .status-clean { background: #c6f6d5; color: #22543d; }
        .status-falsepositive { background: #bee3f8; color: #2a4365; }
        .status-suspicious { background: #fed7d7; color: #742a2a; }
        .status-str { background: #feb2b2; color: #742a2a; }
        @media print { body { background: white; } .panel:first-child { display: none; } .actions { display: none; } }
    </style>
<base target="_blank">
<base target="_blank">
<base target="_blank">
</head>
<body>
    <div class="container">
        <div class="panel">
            <div class="panel-header">📋 Assessment Input Form</div>
            <div class="panel-body">
                <form id="assessmentForm">
                    <div class="form-section">
                        <div class="section-title">Transaction Details</div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Transaction Type *</label>
                                <select id="transactionType" required>
                                    <option value="">Select</option>
                                    <option value="Individual">Individual</option>
                                    <option value="Corporate">Corporate</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Date</label>
                                <input type="date" id="assessmentDate">
                            </div>
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Location (City/Province) *</label>
                                <input type="text" id="location" placeholder="e.g., DANAO CITY, CEBU" required>
                            </div>
                            <div class="form-group">
                                <label>Principal Amount (PHP) *</label>
                                <input type="number" id="principalAmount" placeholder="e.g., 50000" required>
                            </div>
                        </div>
                    </div>

                    <div id="corporateFields" class="form-section hidden">
                        <div class="section-title">Corporate Details</div>
                        <div class="form-group">
                            <label>Company Name *</label>
                            <input type="text" id="companyName" placeholder="Company name">
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Representative Type *</label>
                                <select id="representativeType">
                                    <option value="">Select</option>
                                    <option value="UBO">UBO</option>
                                    <option value="Authorized">Authorized</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Nature of Business</label>
                                <input type="text" id="companyNature" placeholder="e.g., Retail, Services">
                            </div>
                        </div>
                        <div id="beneficialOwnerGroup" class="hidden">
                            <div class="form-group">
                                <label>Beneficial Owner Name *</label>
                                <input type="text" id="beneficialOwner" placeholder="Name of owner who sent the representative">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="section-title">Customer Profile</div>
                        <div class="form-group">
                            <label id="customerLabel">Customer Name *</label>
                            <input type="text" id="customerName" placeholder="Lastname, Firstname M." required>
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Gender *</label>
                                <select id="gender" required>
                                    <option value="">Select</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                    <option value="neutral">Neutral</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Employment Status *</label>
                                <select id="employmentStatus" required>
                                    <option value="">Select</option>
                                    <option value="Employed">Employed</option>
                                    <option value="Self-Employed">Self-Employed</option>
                                    <option value="Retired">Retired</option>
                                    <option value="Student">Student</option>
                                    <option value="Overseas Worker">OFW</option>
                                    <option value="Unemployed">Unemployed</option>
                                </select>
                            </div>
                        </div>
                        <div id="employedFields" class="hidden">
                            <div class="form-group">
                                <label>Employer Name</label>
                                <input type="text" id="employerName" placeholder="Company name">
                            </div>
                            <div class="form-group">
                                <label>Position</label>
                                <input type="text" id="position" placeholder="Job title">
                            </div>
                        </div>
                        <div id="businessFields" class="hidden">
                            <div class="form-group">
                                <label>Trade Name</label>
                                <input type="text" id="tradeName" placeholder="Business name">
                            </div>
                            <div class="form-group">
                                <label>Nature</label>
                                <input type="text" id="businessNature" placeholder="e.g., Retail">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="section-title">Source</div>
                        <div class="form-group">
                            <label>Source of Fund *</label>
                            <select id="sourceOfFund" required>
                                <option value="">Select</option>
                                <option value="BUSINESS">BUSINESS</option>
                                <option value="SALARY">SALARY</option>
                                <option value="ALLOWANCE/REMITTANCE">ALLOWANCE/REMITTANCE</option>
                                <option value="PENSION">PENSION</option>
                                <option value="SAVINGS & INVESTMENT">SAVINGS & INVESTMENT</option>
                                <option value="INHERITANCE">INHERITANCE</option>
                                <option value="CHURCH DONATIONS">CHURCH DONATIONS</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Source of Jewelry *</label>
                            <select id="sourceOfJewelry" required>
                                <option value="">Select</option>
                                <option value="Personal">Personal</option>
                                <option value="Business">Business</option>
                                <option value="Salary">Salary</option>
                                <option value="Allowance/Remittance">Allowance/Remittance</option>
                                <option value="Pension">Pension</option>
                                <option value="Savings & Investment">Savings & Investment</option>
                                <option value="Inheritance">Inheritance</option>
                                <option value="Third Party">Third Party</option>
                                <option value="Rematado Display">Rematado Display</option>
                                <option value="AUTHORIZED BY THE OWNER">Authorization</option>
                            </select>
                        </div>
                        <div id="jewelryOwnerGroup" class="hidden">
                            <div class="form-group">
                                <label>Jewelry Owner</label>
                                <input type="text" id="jewelryOwner" placeholder="Owner name">
                            </div>
                            <div class="form-group">
                                <label>Relationship</label>
                                <select id="ownerRelationship">
                                    <option value="">Select</option>
                                    <option value="Spouse">Spouse</option>
                                    <option value="Parent">Parent</option>
                                    <option value="Child">Child</option>
                                    <option value="Sibling">Sibling</option>
                                    <option value="Employer">Employer</option>
                                    <option value="Business Partner">Business Partner</option>
                                    <option value="Partner">Partner</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Business Source</label>
                                <input type="text" id="jewelrySourceBusiness" placeholder="e.g., EMILY DRYGOODS STORE">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="section-title">Purpose</div>
                        <div class="form-group">
                            <label>Transaction Purpose *</label>
                            <select id="transactionPurpose" required>
                                <option value="">Select</option>
                                <option value="BUSINESS OPERATION TRANSACTIONS">BUSINESS OPERATION</option>
                                <option value="CAPITAL FOR BUSINESS">BUSINESS CAPITAL</option>
                                <option value="SALARY/PAYROLL">SALARY/PAYROLL</option>
                                <option value="BILLS PAYMENT">BILLS PAYMENT</option>
                                <option value="SCHOOL/TUITION FEE">SCHOOL/TUITION</option>
                                <option value="HOSPITAL & MEDICAL EXPENSE">MEDICAL EXPENSE</option>
                                <option value="CONSTRUCTION & RENOVATION">CONSTRUCTION</option>
                                <option value="FUNDS FOR PAWN ITEM REDEMPTION">PAWN REDEMPTION</option>
                                <option value="ADDITIONAL PAWN PRINCIPAL">ADDITIONAL PRINCIPAL</option>
                                <option value="FINANCIAL SUPPORT">FINANCIAL SUPPORT</option>
                                <option value="TRAVEL EXPENSE">TRAVEL</option>
                                <option value="DOWRY/WEDDING EXPENSE">WEDDING</option>
                                <option value="DONATION, CHARITY, AND OUTREACH ACTIVITIES">DONATION/CHARITY</option>
                                <option value="INVESTMENT AND ITEM FOR PERSONAL USE">INVESTMENT/PERSONAL USE</option>
                                <option value="ADDITIONAL BUDGET FOR FAMILY DAILY EXPENSES">FAMILY EXPENSES</option>
                                <option value="TAKE OUT TRANSACTION ASSISSTED BY BRANCH">TAKE OUT TRANSACTION</option>
                                <option value="CHANGE RECEIVER OF PAWNERS NAME">PAWNER'S NAME UPDATE</option>
                                <option value="REMATADO SALE TRANSACTION">REMATADO SALE</option>
                                 <option value="BILI SANGLA TRANSACTIONS">BILI SANGLA</option>
                                <option value="RENEWAL THRU AUTHORIZED REPRESENTATIVE">AUTHORIZED REPRESENTATIVE</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="section-title">Documents</div>
                        <div class="checkbox-group">
                            <div class="checkbox-item"><input type="checkbox" id="doc1" value="Business Permit"><label for="doc1">Business Permit</label></div>
                            <div class="checkbox-item"><input type="checkbox" id="doc2" value="Authorization Letter"><label for="doc2">Auth Letter</label></div>
                            <div class="checkbox-item"><input type="checkbox" id="doc3" value="SEC Registration"><label for="doc3">SEC Reg</label></div>
                            <div class="checkbox-item"><input type="checkbox" id="doc4" value="DTI Registration"><label for="doc4">DTI Reg</label></div>
                            <div class="checkbox-item"><input type="checkbox" id="doc7" value="Payslip"><label for="doc7">Payslip</label></div>
                            <div class="checkbox-item"><input type="checkbox" id="doc8" value="BIR Certificate of Registration"><label for="doc8">BIR Certificate of Registration</label></div>
                            <div class="checkbox-item"><input type="checkbox" id="doc8" value="Special Power of Attorney"><label for="doc8">Special Power of Attorney</label></div>
                            <div class="checkbox-item"><input type="checkbox" id="doc8" value="Barangay Business Permit"><label for="doc8">Barangay Business Permit</label></div>
                        </div>
                        </div>
                        <div class="form-group" style="margin-top: 12px;">
                            <label>Document Status *</label>
                            <select id="documentStatus" required>
                                <option value="">Select</option>
                                <option value="All requisite documentation has been duly submitted">Complete - All required documents submitted</option>
                                <option value="The documentation remains incomplete; submission of pending requirements is to be follow">Incomplete - Pending documents</option>
                                <option value="All submitted documentation has been thoroughly authenticated, validated, and confirmed">Verified - Authenticated and valid</option>
                                <option value="Documentation is presently undergoing comprehensive verification and authentication procedures.">Under Review - Verification in progress</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="section-title">Compliance</div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>AML Alerts</label>
                                <select id="amlAlerts">
                                    <option value="None">None</option>
                                    <option value="THE CUSTOMER FLAGGED ONCE">Flagged 1x</option>
                                    <option value="THE CUSTOMER FLAGGED TWICE">Flagged 2x</option>
                                    <option value="THE CUSTOMER FLAGGED MORETHAN THREE TIMES">Flagged 3x+</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Watchlist</label>
                                <select id="watchlistStatus">
                                    <option value="Clean">Clean</option>
                                    <option value="Listed">Listed</option>
                                    <option value="PEP">PEP</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Historical</label>
                                <select id="historicalReview">
                                    <option value="Normal">Normal</option>
                                    <option value="Unusual">Unusual</option>
                                    <option value="Inconsistent">Inconsistent</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Volume</label>
                                <select id="volumeAssessment">
                                    <option value="Proportionate">Proportionate</option>
                                    <option value="High">High</option>
                                    <option value="Inconsistent">Inconsistent</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="section-title">Final Disposition</div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Disposition *</label>
                                <select id="finalDisposition" required>
                                    <option value="">Select Transaction Type First</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Analyst</label>
                                <input type="text" id="analystName" placeholder="Name">
                            </div>
                        </div>
                    </div>

                    <div class="actions">
                        <button type="button" class="btn btn-primary" onclick="generateAssessment()">⚡ Generate</button>
                        <button type="button" class="btn btn-success" onclick="copyAssessment()">📋 Copy</button>
                        <button type="button" class="btn btn-warning" onclick="printAssessment()">🖨️ Print</button>
                        <button type="reset" class="btn btn-secondary" onclick="resetForm()">🔄 Reset</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                📄 Generated Report
                <span id="statusBadge" class="status-badge status-clean">DRAFT</span>
            </div>
            <div class="panel-body">
                <div id="assessmentOutput" class="output-panel">
                    <div class="assessment-header">
                        <h2>TRANSACTION ASSESSMENT REPORT</h2>
                        <div>Fill form and click Generate</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('assessmentDate').valueAsDate = new Date();
            setupListeners();
        });

        function setupListeners() {
            // Transaction Type toggle
            document.getElementById('transactionType').addEventListener('change', function() {
                const corporateFields = document.getElementById('corporateFields');
                const repType = document.getElementById('representativeType');
                const customerLabel = document.getElementById('customerLabel');
                const dispositionSelect = document.getElementById('finalDisposition');

                if (this.value === 'Corporate') {
                    corporateFields.classList.remove('hidden');
                    repType.required = true;
                    customerLabel.textContent = 'Representative Name *';

                    // Corporate disposition options
                    dispositionSelect.innerHTML = `
                        <option value="">Select Disposition</option>
                        <option value="Clean">Clean</option>
                        <option value="FalsePositive">False Positive</option>
                        <option value="Suspicious">Suspicious - Report as STR</option>
                    `;
                } else if (this.value === 'Individual') {
                    corporateFields.classList.add('hidden');
                    repType.required = false;
                    document.getElementById('beneficialOwnerGroup').classList.add('hidden');
                    document.getElementById('beneficialOwner').required = false;
                    customerLabel.textContent = 'Customer Name *';

                    // Individual disposition options
                    dispositionSelect.innerHTML = `
                        <option value="">Select Disposition</option>
                        <option value="FalsePositive">False Positive</option>
                        <option value="Suspicious">Suspicious - Report as STR</option>
                    `;
                } else {
                    dispositionSelect.innerHTML = `<option value="">Select Transaction Type First</option>`;
                }
            });

            // Representative Type toggle for Beneficial Owner
            document.getElementById('representativeType').addEventListener('change', function() {
                const boGroup = document.getElementById('beneficialOwnerGroup');
                const boField = document.getElementById('beneficialOwner');

                if (this.value === 'Authorized') {
                    boGroup.classList.remove('hidden');
                    boField.required = true;
                } else {
                    boGroup.classList.add('hidden');
                    boField.required = false;
                    boField.value = '';
                }
            });

            // Employment Status toggle
            document.getElementById('employmentStatus').addEventListener('change', function() {
                document.getElementById('employedFields').classList.add('hidden');
                document.getElementById('businessFields').classList.add('hidden');
                if (this.value === 'Employed' || this.value === 'Overseas Worker') {
                    document.getElementById('employedFields').classList.remove('hidden');
                } else if (this.value === 'Self-Employed') {
                    document.getElementById('businessFields').classList.remove('hidden');
                }
            });

            // Source of Jewelry toggle
            document.getElementById('sourceOfJewelry').addEventListener('change', function() {
                const group = document.getElementById('jewelryOwnerGroup');
                if (this.value === 'Third Party' || this.value === 'Business' || this.value === 'Inheritance') {
                    group.classList.remove('hidden');
                } else {
                    group.classList.add('hidden');
                }
            });
        }

        function resetForm() {
            document.getElementById('corporateFields').classList.add('hidden');
            document.getElementById('beneficialOwnerGroup').classList.add('hidden');
            document.getElementById('employedFields').classList.add('hidden');
            document.getElementById('businessFields').classList.add('hidden');
            document.getElementById('jewelryOwnerGroup').classList.add('hidden');
            document.getElementById('customerLabel').textContent = 'Customer Name *';
            document.getElementById('assessmentDate').valueAsDate = new Date();
            document.getElementById('finalDisposition').innerHTML = `<option value="">Select Transaction Type First</option>`;
        }

        function generateAssessment() {
            const form = document.getElementById('assessmentForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const data = collectData();
            const p = getPronouns(data.gender);
            const narrative = buildNarrative(data, p);

            document.getElementById('assessmentOutput').innerHTML = narrative;
            updateBadge(data.finalDisposition);
        }

        function collectData() {
            const docs = [];
            document.querySelectorAll('.checkbox-group input:checked').forEach(cb => docs.push(cb.value));

            return {
                transactionType: document.getElementById('transactionType').value,
                companyName: document.getElementById('companyName').value.trim().toUpperCase(),
                representativeType: document.getElementById('representativeType').value,
                beneficialOwner: document.getElementById('beneficialOwner').value.trim().toUpperCase(),
                companyNature: document.getElementById('companyNature').value.trim().toUpperCase(),
                customerName: document.getElementById('customerName').value.trim().toUpperCase(),
                gender: document.getElementById('gender').value,
                date: document.getElementById('assessmentDate').value,
                location: document.getElementById('location').value.trim().toUpperCase(),
                principalAmount: document.getElementById('principalAmount').value,
                employmentStatus: document.getElementById('employmentStatus').value,
                employerName: document.getElementById('employerName').value.trim().toUpperCase(),
                position: document.getElementById('position').value.trim().toUpperCase(),
                tradeName: document.getElementById('tradeName').value.trim().toUpperCase(),
                businessNature: document.getElementById('businessNature').value.trim().toUpperCase(),
                sourceOfFund: document.getElementById('sourceOfFund').value,
                sourceOfJewelry: document.getElementById('sourceOfJewelry').value,
                jewelryOwner: document.getElementById('jewelryOwner').value.trim().toUpperCase(),
                ownerRelationship: document.getElementById('ownerRelationship').value,
                jewelrySourceBusiness: document.getElementById('jewelrySourceBusiness').value.trim().toUpperCase(),
                purpose: document.getElementById('transactionPurpose').value,
                documents: docs,
                documentStatus: document.getElementById('documentStatus').value,
                amlAlerts: document.getElementById('amlAlerts').value,
                watchlist: document.getElementById('watchlistStatus').value,
                historical: document.getElementById('historicalReview').value,
                volume: document.getElementById('volumeAssessment').value,
                disposition: document.getElementById('finalDisposition').value,
                analyst: document.getElementById('analystName').value.trim()
            };
        }

        function getPronouns(gender) {
            const map = {
                male: { s: 'he', o: 'him', p: 'his', r: 'himself', t: 'Mr.' },
                female: { s: 'she', o: 'her', p: 'her', r: 'herself', t: 'Ms.' },
                neutral: { s: 'they', o: 'them', p: 'their', r: 'themselves', t: 'Mx.' }
            };
            return map[gender] || map.male;
        }

        function buildNarrative(data, p) {
            let paragraph = '';

            // Opening - Customer/Representative info
            if (data.transactionType === 'Corporate') {
                paragraph += data.customerName + ' IS ';
                if (data.representativeType === 'Authorized') {
                    paragraph += 'AN AUTHORIZED REPRESENTATIVE OF ' + data.companyName;
                    if (data.companyNature) paragraph += ' ENGAGED IN ' + data.companyNature;
                    paragraph += '. ' + p.s.toUpperCase() + ' WAS AUTHORIZED BY ' + data.beneficialOwner + ' TO TRANSACT ON BEHALF OF THE COMPANY';
                } else {
                    paragraph += 'THE ULTIMATE BENEFICIAL OWNER (UBO) OF ' + data.companyName;
                    if (data.companyNature) paragraph += ' ENGAGED IN ' + data.companyNature;
                }
                paragraph += '. ';
            } else {
                paragraph += data.customerName + ' IS ';
                if (data.employmentStatus === 'Employed' && data.employerName) {
                    paragraph += 'EMPLOYED AT ' + data.employerName;
                    if (data.position) paragraph += ' AS ' + data.position;
                    paragraph += '. ';
                } else if (data.employmentStatus === 'Self-Employed' && data.tradeName) {
                    paragraph += 'ENGAGED IN BUSINESS UNDER THE TRADE NAME ' + data.tradeName;
                    if (data.businessNature) paragraph += ' ENGAGED IN ' + data.businessNature;
                    paragraph += '. ';
                } else if (data.employmentStatus === 'Unemployed') {
                    paragraph += 'UNEMPLOYED AND RESIDES IN ' + data.location + '. ';
                } else {
                    paragraph += data.employmentStatus.toUpperCase() + '. ';
                }
            }

            // Source of funds and jewelry
            paragraph += 'THE SOURCE OF FUNDS IS ' + data.sourceOfFund;
            if (data.sourceOfFund === 'BUSINESS' && data.tradeName) {
                paragraph += ' FROM ' + data.tradeName;
            } else if (data.sourceOfFund === 'SALARY' && data.employerName) {
                paragraph += ' FROM ' + data.employerName;
            }
            paragraph += '. ';

            // Jewelry source
            if (data.jewelryOwner && data.jewelryOwner !== data.customerName) {
                paragraph += 'THE SOURCE OF THE JEWELRY IS FROM ' + data.jewelryOwner;
                if (data.ownerRelationship) paragraph += ', ' + p.p.toUpperCase() + ' ' + data.ownerRelationship;
                paragraph += '. ';
                if (data.jewelrySourceBusiness) {
                    paragraph += 'THE FUNDS CAME FROM ' + data.jewelrySourceBusiness + '. ';
                }
            } else {
                paragraph += 'THE SOURCE OF THE JEWELRY IS FROM ' + data.sourceOfJewelry.toUpperCase() + '. ';
            }

            // Purpose and Amount
            paragraph += 'THE PURPOSE OF THE TRANSACTION IS ' + data.purpose + ' WITH A PRINCIPAL AMOUNT OF PHP ' + Number(data.principalAmount).toLocaleString('en-PH', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + '. ';

            // Location
            paragraph += 'THE TRANSACTION TOOK PLACE IN ' + data.location + '. ';

            // Documents
            if (data.documents.length > 0) {
                paragraph += data.documents.join(', ').toUpperCase() + ' WERE PROVIDED AS SUPPORTING DOCUMENTS. ';
            }

            // Document Status
            if (data.documentStatus) {
                paragraph += '' + data.documentStatus.toUpperCase() + '. ';
            }

            // Compliance findings
            if (data.amlAlerts !== 'None' || data.watchlist !== 'Clean') {
                paragraph += '';
                if (data.amlAlerts !== 'None') paragraph += '' + data.amlAlerts + '. ';
                if (data.watchlist !== 'Clean') paragraph += '' + data.watchlist + '. ';
            }

            paragraph += 'HISTORICAL REVIEW INDICATES ' + data.historical + ' ACTIVITY WITH ' + data.volume + ' VOLUME. ';

            // Final assessment
            if (data.volume === 'Proportionate' && data.historical === 'Normal' && data.amlAlerts === 'None' && data.watchlist === 'Clean') {
                paragraph += 'THE SOURCE OF PAWNED ITEM, VOLUME AND VALUE OF TRANSACTIONS CORRESPOND TO ';
                if (data.transactionType === 'Corporate') {
                    paragraph += 'THE NATURE OF BUSINESS AND THE STATED PURPOSE OF THE TRANSACTION. ';
                } else {
                    paragraph += 'THE NATURE OF WORK AND FINANCIAL CAPACITY. ';
                }
                paragraph += 'FURTHERMORE, ' + data.customerName + ' HAS NO HISTORY OF SUSPICIOUS TRANSACTIONS AND HAS NO RECORD IN THE WATCHLIST SYSTEM. ';
            }

            // Disposition
            switch(data.disposition) {
                case 'Clean': 
                    paragraph += 'THE ASSOCIATED CUSTOMER OF THE ALERT SHALL BE MARKED AS CLEAN FOR THAT PARTICULAR ALERT AND DATE ONLY. ALERT CAN STILL BE GENERATED IF THE CUSTOMER\'S ACCOUNT AND/OR TRANSACTION HIT/BREACHED A CERTAIN SCENARIO/S.'; 
                    break;
                case 'FalsePositive': 
                    paragraph += 'THE ASSOCIATED CUSTOMER OF THE ALERT SHALL NOT BE TAGGED AS SUSPICIOUS AND THE SYSTEM SHALL NOT TRIGGER ALERT/S FOR SUCCEEDING TRANSACTIONS OR SCENARIOS FOR A SPECIFIED PERIOD.'; 
                    break;
                case 'Suspicious': 
                    paragraph += 'REPORT AS STR. THE TRANSACTION AND ITS ASSOCIATED CUSTOMER WITH ALERT/S, REVIEWED/EVALUATED AS SUSPICIOUS, AN STR SHALL BE FILED/REPORTED TO THE AMLC IN ACCORDANCE WITH REGULATORY REQUIREMENTS.'; 
                    break;
            }

            if (data.analyst) {
                paragraph += ' ASSESSED BY: ' + data.analyst.toUpperCase() + '.';
            }

            return '<div class="assessment-header"><h2>TRANSACTION ASSESSMENT REPORT</h2><div>' + formatDate(data.date) + '</div></div><div class="assessment-body"><p style="text-align: justify;">' + paragraph + '</p></div>';
        }

        function formatDate(dateStr) {
            if (!dateStr) return new Date().toLocaleDateString('en-US', {year:'numeric', month:'long', day:'numeric'});
            return new Date(dateStr).toLocaleDateString('en-US', {year:'numeric', month:'long', day:'numeric'});
        }

        function updateBadge(disposition) {
            const badge = document.getElementById('statusBadge');
            const statusMap = {
                'Clean': { text: 'CLEAN', class: 'status-clean' },
                'FalsePositive': { text: 'FALSE POSITIVE', class: 'status-falsepositive' },
                'Suspicious': { text: 'SUSPICIOUS - STR', class: 'status-str' }
            };

            const status = statusMap[disposition] || { text: 'DRAFT', class: 'status-clean' };
            badge.textContent = status.text;
            badge.className = 'status-badge ' + status.class;
        }

        function copyAssessment() {
            const text = document.getElementById('assessmentOutput').innerText;
            navigator.clipboard.writeText(text).then(function() {
                alert('Copied to clipboard!');
            });
        }

        function printAssessment() {
            window.print();
        }
    </script>
</body>
</html>
